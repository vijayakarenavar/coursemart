name: coursemart_app
description: "CourseMart Student App - Access your courses, lectures, and notes"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP Client
  dio: ^5.4.0

  # Secure Storage for JWT token
  flutter_secure_storage: ^9.0.0

  # Environment variables
  flutter_dotenv: ^5.1.0

  # State Management
  provider: ^6.1.1

  # Video Player
  youtube_player_flutter: ^9.0.1

  # File handling
  open_file: ^3.3.2
  path_provider: ^2.1.1
  flutter_pdfview: ^1.3.2

  # Image caching
  cached_network_image: ^3.3.0

  # UI Components
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9

  # 🔔 Firebase & Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2
  shared_preferences: ^2.3.3

  # Local cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Date formatting
  intl: ^0.19.0

  # WebView
  webview_flutter: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  # Load .env file
  assets:
    - .env